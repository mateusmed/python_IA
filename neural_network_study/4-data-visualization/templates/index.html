<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Network Panel</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        #header {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1e1e;
            padding: 8px 15px;
            border-radius: 6px;
            border-bottom: 2px solid #00bcd4;
            margin-bottom: 10px;
        }

        #dashboard-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 0;
            overflow: hidden;
        }

        #top-row {
            display: flex;
            height: 40%; /* Initial height */
            min-height: 100px;
        }

        .window {
            background: #1e1e1e;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            position: relative;
            flex-grow: 1;
            min-width: 150px;
        }

        #window-network {
            width: 50%; /* Initial width */
        }

        .window-header {
            background: #2d2d2d;
            padding: 6px 12px;
            font-weight: bold;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .window-content {
            flex-grow: 1;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        .gutter {
            background: #121212;
            transition: background 0.2s;
            flex-shrink: 0;
            z-index: 10;
        }

        .gutter:hover {
            background: #00bcd4;
        }

        .gutter-v {
            width: 8px;
            cursor: col-resize;
        }

        .gutter-h {
            height: 8px;
            cursor: row-resize;
            width: 100%;
        }

        .neuron {
            stroke: #444;
            stroke-width: 2px;
            transition: r 0.2s, stroke-width 0.2s;
        }

        .neuron:hover {
            stroke: #00bcd4;
            stroke-width: 4px;
            cursor: pointer;
        }

        .link {
            stroke-opacity: 0.4;
        }

        .info-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.85);
            padding: 10px;
            border-radius: 5px;
            width: 180px;
            pointer-events: none;
            display: none;
            border: 1px solid #444;
            z-index: 1000;
        }

        .detail-row {
            font-size: 0.7rem;
            margin: 2px 0;
        }

        .value {
            color: #00bcd4;
            float: right;
        }

        button {
            background: #00bcd4;
            border: none;
            color: #000;
            padding: 3px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.7rem;
        }

        button:hover {
            background: #008ba3;
        }

        canvas {
            display: block;
        }

    </style>
</head>
<body>
    <div id="header">
        <div style="font-size: 1rem; font-weight: bold; color: #00bcd4;">NEURAL ENGINE PRO</div>
        <div id="status" style="font-size: 0.7rem;">INITIALIZING...</div>
    </div>

    <div id="dashboard-container">
        <!-- Row 1: 2D Views -->
        <div id="top-row">
            <div class="window" id="window-network">
                <div class="window-header">
                    <span>2D Topology</span>
                    <button id="reset-zoom">Reset</button>
                </div>
                <div class="window-content" id="network-container">
                    <div class="info-panel" id="info-panel">
                        <div style="font-weight:bold; margin-bottom:5px; border-bottom:1px solid #00bcd4; font-size: 0.8rem;" id="info-id">Neuron</div>
                        <div class="detail-row">Bias: <span class="value" id="info-bias"></span></div>
                        <div class="detail-row">Output: <span class="value" id="info-output"></span></div>
                        <div id="info-weights" style="margin-top:5px; font-size: 0.65rem; color: #888;"></div>
                    </div>
                </div>
            </div>
            
            <div class="gutter gutter-v" id="v-gutter"></div>

            <div class="window" id="window-curve">
                <div class="window-header">
                    <span>Decision Map (2D)</span>
                </div>
                <div class="window-content" id="curve-container"></div>
            </div>
        </div>

        <div class="gutter gutter-h" id="h-gutter"></div>

        <!-- Row 2: 3D View -->
        <div class="window" id="window-3d-surface" style="flex-grow: 1;">
            <div class="window-header">
                <span>3D Decision Surface</span>
                <span style="font-size:0.65rem; color:#888;">DRAG TO ROTATE • SCROLL TO ZOOM</span>
            </div>
            <div class="window-content" id="three-container"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Shared state
        let networkData = null;
        let curveData = null;

        // --- Window 1: Network Topology (D3.js) ---
        const netContainer = document.getElementById("network-container");
        const netSvg = d3.select("#network-container").append("svg")
            .attr("width", "100%")
            .attr("height", "100%");

        const netG = netSvg.append("g");
        const netZoom = d3.zoom().scaleExtent([0.1, 8]).on("zoom", (event) => netG.attr("transform", event.transform));
        netSvg.call(netZoom);
        d3.select("#reset-zoom").on("click", () => netSvg.transition().duration(500).call(netZoom.transform, d3.zoomIdentity));

        function render2DNetwork(data) {
            if (!data) return;
            netG.selectAll("*").remove();
            const rect = netContainer.getBoundingClientRect();
            const width = rect.width, height = rect.height;
            const margin = { top: 30, right: 30, bottom: 30, left: 30 };
            const structure = data.structure, layers = data.layers;
            const nodeRadius = Math.min(width, height) / 30;
            const layerGap = (width - margin.left - margin.right) / (structure.length);
            
            const nodes = [], links = [];
            const inputNodes = [];
            const inputYStep = (height - margin.top - margin.bottom) / (structure[0] + 1);
            for (let i = 0; i < structure[0]; i++) {
                const n = { id: `In.${i+1}`, x: margin.left, y: margin.top + (i + 1) * inputYStep, layer: 0, isInput: true };
                nodes.push(n);
                inputNodes.push(n);
            }

            let prevLayerNodes = inputNodes;
            layers.forEach((layer, layerIdx) => {
                const currentLayerNodes = [];
                const currentLayerIdx = layerIdx + 1;
                const yStep = (height - margin.top - margin.bottom) / (layer.length + 1);
                layer.forEach((neuron, neuronIdx) => {
                    const n = { ...neuron, x: margin.left + currentLayerIdx * layerGap, y: margin.top + (neuronIdx + 1) * yStep, layer: currentLayerIdx };
                    nodes.push(n);
                    currentLayerNodes.push(n);
                    neuron.weights.forEach((w, wIdx) => links.push({ source: prevLayerNodes[wIdx], target: n, weight: w }));
                });
                prevLayerNodes = currentLayerNodes;
            });

            const colorScale = d3.scaleDiverging().domain([-1.5, 0, 1.5]).interpolator(d3.interpolateRdBu);
            netG.selectAll(".link").data(links).enter().append("line").attr("class", "link")
                .attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y)
                .attr("stroke", d => colorScale(d.weight)).attr("stroke-width", d => Math.abs(d.weight) * 2 + 0.5);

            const nodeGroups = netG.selectAll(".neuron-group").data(nodes).enter().append("g").attr("transform", d => `translate(${d.x},${d.y})`);
            nodeGroups.append("circle").attr("class", "neuron").attr("r", nodeRadius).attr("fill", d => d.isInput ? "#444" : "#111")
                .on("mouseover", (event, d) => {
                    if (d.isInput) return;
                    d3.select("#info-panel").style("display", "block");
                    d3.select("#info-id").text(`Neuron ${d.id}`);
                    d3.select("#info-bias").text(d.bias.toFixed(3));
                    d3.select("#info-output").text(d.output.toFixed(3));
                    const weights = d.weights.map((w, i) => `W${i}: ${w.toFixed(3)}`).join('<br>');
                    d3.select("#info-weights").html(weights);
                })
                .on("mouseout", () => d3.select("#info-panel").style("display", "none"));
        }

        // --- Window 2: 2D Curve Space ---
        function renderCurveSpace2D(data) {
            if (!data) return;
            const container = document.getElementById("curve-container");
            container.innerHTML = "";
            const rect = container.getBoundingClientRect();
            const width = rect.width, height = rect.height, res = data.resolution;
            const canvas = d3.select(container).append("canvas").attr("width", width).attr("height", height).node();
            const ctx = canvas.getContext("2d");
            const xScale = d3.scaleLinear().domain([-0.5, 1.5]).range([0, width]);
            const yScale = d3.scaleLinear().domain([-0.5, 1.5]).range([height, 0]);
            const colorScale = d3.scaleSequential().domain([0, 1]).interpolator(d3.interpolateViridis);
            
            for (let i = 0; i < res; i++) {
                for (let j = 0; j < res; j++) {
                    const idx = i + j * res;
                    ctx.fillStyle = colorScale(data.z[idx]);
                    ctx.fillRect(i * (width/res), (res-1-j) * (height/res), (width/res)+1, (height/res)+1);
                }
            }
            ctx.strokeStyle = "rgba(255,255,255,0.1)";
            ctx.beginPath(); ctx.moveTo(xScale(0), 0); ctx.lineTo(xScale(0), height); ctx.moveTo(0, yScale(0)); ctx.lineTo(width, yScale(0)); ctx.stroke();
            data.train_data.X.forEach((point, i) => {
                ctx.fillStyle = data.train_data.y[i][0] === 1 ? "white" : "red";
                ctx.beginPath(); ctx.arc(xScale(point[0]), yScale(point[1]), 4, 0, Math.PI * 2); ctx.fill();
            });
        }

        // --- Window 3: 3D Decision Surface (Three.js) ---
        let scene, camera, renderer, controls;
        const threeContainer = document.getElementById("three-container");

        function init3D() {
            const rect = threeContainer.getBoundingClientRect();
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            camera = new THREE.PerspectiveCamera(45, rect.width / rect.height, 0.1, 1000);
            camera.position.set(10, 10, 10);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(rect.width, rect.height);
            threeContainer.appendChild(renderer.domElement);
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(15, 15, 15);
            scene.add(pointLight);
            scene.add(new THREE.GridHelper(20, 20, 0x333333, 0x222222));
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (renderer && scene && camera) renderer.render(scene, camera);
        }

        function render3DSurface(data) {
            if (!data || !scene) return;
            const existingSurface = scene.getObjectByName("decisionSurface");
            if (existingSurface) scene.remove(existingSurface);
            const existingPoints = scene.getObjectByName("trainingPoints");
            if (existingPoints) scene.remove(existingPoints);

            const res = data.resolution, size = 10;
            const geometry = new THREE.PlaneGeometry(size, size, res - 1, res - 1);
            geometry.rotateX(-Math.PI / 2);
            const vertices = geometry.attributes.position.array;
            const colors = [];
            const colorMap = d3.interpolateViridis;

            for (let j = 0; j < res; j++) {
                for (let i = 0; i < res; i++) {
                    const idx = i + j * res;
                    const z_val = data.z[idx];
                    vertices[idx * 3 + 1] = z_val * 3;
                    const c = d3.color(colorMap(z_val));
                    colors.push(c.r / 255, c.g / 255, c.b / 255);
                }
            }
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.computeVertexNormals();

            const surface = new THREE.Mesh(geometry, new THREE.MeshPhongMaterial({ vertexColors: true, side: THREE.DoubleSide, shininess: 50, transparent: true, opacity: 0.9 }));
            surface.name = "decisionSurface";
            scene.add(surface);

            const pointsGroup = new THREE.Group();
            pointsGroup.name = "trainingPoints";
            const pointGeom = new THREE.SphereGeometry(0.15, 16, 16);
            data.train_data.X.forEach((point, i) => {
                const target = data.train_data.y[i][0];
                const sphere = new THREE.Mesh(pointGeom, new THREE.MeshPhongMaterial({ color: target === 1 ? 0xffffff : 0xff0000 }));
                sphere.position.set((point[0] - 0.5) * size, target * 3, (point[1] - 0.5) * size);
                pointsGroup.add(sphere);
            });
            scene.add(pointsGroup);
            controls.target.set(0, 1.5, 0);
        }

        // --- Resize Observers ---
        const observer = new ResizeObserver(entries => {
            for (let entry of entries) {
                if (entry.target.id === 'network-container') render2DNetwork(networkData);
                if (entry.target.id === 'curve-container') renderCurveSpace2D(curveData);
                if (entry.target.id === 'three-container' && renderer && camera) {
                    const r = entry.target.getBoundingClientRect();
                    camera.aspect = r.width / r.height;
                    camera.updateProjectionMatrix();
                    renderer.setSize(r.width, r.height);
                }
            }
        });
        observer.observe(document.getElementById('network-container'));
        observer.observe(document.getElementById('curve-container'));
        observer.observe(document.getElementById('three-container'));

        // --- Gutter Dragging Logic ---
        const dashboard = document.getElementById('dashboard-container');
        const topRow = document.getElementById('top-row');
        const netWin = document.getElementById('window-network');
        const vGutter = document.getElementById('v-gutter');
        const hGutter = document.getElementById('h-gutter');

        let isVDragging = false;
        let isHDragging = false;

        vGutter.addEventListener('mousedown', () => isVDragging = true);
        hGutter.addEventListener('mousedown', () => isHDragging = true);
        document.addEventListener('mouseup', () => { isVDragging = false; isHDragging = false; });

        document.addEventListener('mousemove', (e) => {
            if (isVDragging) {
                const containerRect = topRow.getBoundingClientRect();
                const newWidth = ((e.clientX - containerRect.left) / containerRect.width) * 100;
                if (newWidth > 10 && newWidth < 90) netWin.style.width = `${newWidth}%`;
            }
            if (isHDragging) {
                const containerRect = dashboard.getBoundingClientRect();
                const newHeight = ((e.clientY - containerRect.top) / containerRect.height) * 100;
                if (newHeight > 10 && newHeight < 80) topRow.style.height = `${newHeight}%`;
            }
        });

        // --- Initialization ---
        async function init() {
            init3D();
            try {
                const [netRes, curveRes] = await Promise.all([
                    fetch('/api/network').then(r => r.json()),
                    fetch('/api/curve-space').then(r => r.json())
                ]);
                networkData = netRes;
                curveData = curveRes;
                document.getElementById('status').textContent = 'SYSTEMS ONLINE';
                render2DNetwork(networkData);
                renderCurveSpace2D(curveData);
                render3DSurface(curveData);
            } catch (err) {
                console.error(err);
                document.getElementById('status').textContent = 'SYSTEM ERROR';
            }
        }
        init();
    </script>
</body>
</html>
